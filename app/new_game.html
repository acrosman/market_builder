<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>New Universe - Universe Market Builder</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/new_game.css">
  <link rel="stylesheet" href="css/universe.css">
</head>

<body>
  <div class="game-logo"></div>
  <h1>New Universe Settings</h1>
  <div class="main-layout">
    <form id="new-game-form" class="description">
      <label>
        Universe Name:<br>
        <input type="text" name="universeName" required>
      </label><br><br>
      <label>
        Number of Systems:<br>
        <input type="number" name="systemCount" min="1" max="1000" value="100" required>
      </label><br><br>
      <label>
        Number of Connections:<br>
        <input type="number" name="connectionCount" min="1" max="5000" value="300" required>
      </label><br><br>
      <label>
        Number of Stellar Objects:<br>
        <input type="number" name="stellarObjectCount" min="1" max="1000" value="10" required>
      </label><br><br>
      <button type="submit" id="generate-btn">Generate Universe</button>
      <button type="button" id="close-btn">Close</button>
    </form>
    <div id="universe-diagram"></div>
  </div>
  <script src="../node_modules/d3/dist/d3.min.js"></script>
  <script src="new_game.js"></script>
</body>

</html>
