<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Universe Market Builder - Main Game</title>
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'nonce-d3js';">
  <meta http-equiv="X-Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'nonce-d3js';">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/game.css">
</head>

<body>
  <div class="game-layout">
    <div class="game-left">
      <h2>Available Actions</h2>
      <div class="action-group">
        <h3>Navigation</h3>
        <button id="jump-planner-btn" class="action-btn">Jump to...</button>
        <button id="universe-map-btn" class="action-btn">Universe Map</button>
        <div id="jump-buttons">
          <!-- Jump buttons will be inserted here dynamically -->
        </div>
      </div>
      <div class="action-group">
        <h3>Local Actions</h3>
        <div id="local-buttons">
          <!-- Local action buttons will be inserted here dynamically -->
        </div>
      </div>
      <div class="action-group">
        <h3>Game Actions</h3>
        <div id="game-action-buttons">
          <button id="save-game-btn" class="action-btn">Save Game</button>
          <button id="load-game-btn" class="action-btn">Load Game</button>
          <button id="player-status-btn" class="action-btn">Player Status</button>
          <button id="game-settings-btn" class="action-btn" disabled>Game Settings</button>
        </div>
      </div>
    </div>
    <div class="game-main">
      <div class="game-top">
        <div class="game-status-left">
          <h2>Location Status</h2>
          <div id="location-status">
            <!-- Current system/object info goes here -->
          </div>
        </div>
        <div class="game-status-center">
          <img id="location-image" src="" alt="System View" />
          <div id="no-image-placeholder" class="no-image-placeholder">No System Image Available</div>
        </div>
        <div class="game-status-right">
          <h2>Ship Status</h2>
          <div id="ship-status">
            <!-- Ship info goes here -->
          </div>
        </div>
      </div>
      <div class="game-bottom">
        <h2>Game Console</h2>
        <div id="game-console" class="game-console"></div>
        <input id="game-input" type="text" placeholder="Type your command here..." autocomplete="off">
      </div>
    </div>
  </div>

  <!-- Generic Modal -->
  <div id="game-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Modal</h2>
        <button id="modal-close-btn" class="modal-close-btn">&times;</button>
      </div>
      <div id="modal-body" class="modal-body">
        <!-- Modal content will be loaded here dynamically -->
      </div>
    </div>
  </div>

  <script nonce="d3js" src="../node_modules/d3/dist/d3.min.js"></script>
  <script nonce="d3js" src="game.js"></script>
</body>

</html>
