<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Universe Market Builder - Main Game</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'">
  <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/game.css">
</head>

<body>
  <div class="game-layout">
    <div class="game-main">
      <div class="game-top">
        <div class="game-status-left">
          <h2>Location Status</h2>
          <div id="location-status">
            <!-- Current system/object info goes here -->
          </div>
        </div>
        <div class="game-status-center">
          <img id="location-image" src="" alt="System View" />
          <div id="no-image-placeholder" class="no-image-placeholder">No System Image Available</div>
        </div>
        <div class="game-status-right">
          <h2>Ship Status</h2>
          <div id="ship-status">
            <!-- Ship info goes here -->
          </div>
        </div>
      </div>
    </div>
    <div class="game-controls">
      <div class="game-left">
        <h2>Available Actions</h2>
        <div class="action-group">
          <h3>Navigation</h3>
          <div id="jump-buttons">
            <!-- Jump buttons will be inserted here dynamically -->
          </div>
        </div>
        <div class="action-group">
          <h3>Local Actions</h3>
          <div id="local-buttons">
            <!-- Local action buttons will be inserted here dynamically -->
          </div>
        </div>
        <div class="action-group">
          <h3>Game Actions</h3>
          <div id="game-action-buttons">
            <button id="save-game-btn" class="action-btn">Save Game</button>
            <button id="load-game-btn" class="action-btn">Load Game</button>
            <button id="player-status-btn" class="action-btn">Player Status</button>
            <button id="game-settings-btn" class="action-btn" disabled>Game Settings</button>
          </div>
        </div>
      </div>
      <div class="game-console-section">
        <h2>Game Console</h2>
        <div id="game-console" class="game-console"></div>
        <input id="game-input" type="text" placeholder="Type your command here..." autocomplete="off">
      </div>
    </div>
  </div>

  <!-- Player Status Modal -->
  <div id="player-status-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Player Status</h2>
        <button id="modal-close-btn" class="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="player-stat">
          <span class="player-stat-label">Name:</span>
          <span class="player-stat-value" id="stat-name"></span>
        </div>
        <div class="player-stat">
          <span class="player-stat-label">Credits:</span>
          <span class="player-stat-value" id="stat-credits"></span>
        </div>
        <div class="player-stat">
          <span class="player-stat-label">Ship:</span>
          <span class="player-stat-value" id="stat-ship"></span>
        </div>
        <div class="player-stat">
          <span class="player-stat-label">Energy:</span>
          <span class="player-stat-value" id="stat-energy"></span>
        </div>
        <div class="player-stat">
          <span class="player-stat-label">Cargo:</span>
          <span class="player-stat-value" id="stat-cargo"></span>
        </div>
        <div class="player-stat">
          <span class="player-stat-label">Jumps:</span>
          <span class="player-stat-value" id="stat-jumps"></span>
        </div>
        <div class="player-stat">
          <span class="player-stat-label">Trades:</span>
          <span class="player-stat-value" id="stat-trades"></span>
        </div>
        <div class="player-stat">
          <span class="player-stat-label">Profit:</span>
          <span class="player-stat-value" id="stat-profit"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>

</html>
