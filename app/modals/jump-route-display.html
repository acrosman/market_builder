<div class="route-info">
  <p><strong>Route Found:</strong></p>
  <p id="route-path"></p>
  <p><strong>Total jumps:</strong> <span id="route-jumps"></span></p>
  <p><strong>Time cost:</strong> <span id="route-tick-cost"></span> ticks</p>
  <p><strong>Energy required:</strong> <span id="route-energy-required"></span></p>
  <p><strong>Available energy:</strong> <span id="route-energy-available"></span></p>
  <p id="route-energy-warning" class="error-message" hidden><strong>Warning:</strong> Insufficient energy!</p>
  <button id="confirm-jump-route-btn" class="action-btn">Execute Jump Sequence</button>
  <button id="cancel-jump-route-btn" class="action-btn">Cancel</button>
</div>
