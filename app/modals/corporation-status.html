<div class="corporation-header">
  <h3 id="corp-name"></h3>
  <p id="corp-description"></p>
  <div class="player-stat">
    <span class="player-stat-label">Total Value:</span>
    <span class="player-stat-value" id="corp-value"></span>
  </div>
  <div class="player-stat">
    <span class="player-stat-label">Cash Reserves:</span>
    <span class="player-stat-value" id="corp-cash-total"></span>
  </div>
</div>

<div class="corporation-section">
  <h4>Cash Reserve Allocation</h4>
  <div class="player-stat"><span class="player-stat-label">Trade:</span> <span class="player-stat-value" id="corp-cash-trade"></span></div>
  <div class="player-stat"><span class="player-stat-label">Buildings:</span> <span class="player-stat-value" id="corp-cash-buildings"></span></div>
  <div class="player-stat"><span class="player-stat-label">Planets:</span> <span class="player-stat-value" id="corp-cash-planets"></span></div>
  <div class="player-stat"><span class="player-stat-label">Stocks:</span> <span class="player-stat-value" id="corp-cash-stocks"></span></div>
  <div class="player-stat"><span class="player-stat-label">Ships:</span> <span class="player-stat-value" id="corp-cash-ships"></span></div>
  <div class="player-stat"><span class="player-stat-label">Operations:</span> <span class="player-stat-value" id="corp-cash-operations"></span></div>
</div>

<div class="corporation-section">
  <h4>Owned Planets</h4>
  <div id="corp-planets-list"></div>
</div>

<div class="corporation-section">
  <h4>Fleet</h4>
  <div id="corp-ships-list"></div>
</div>

<div class="player-stat">
  <button id="btn-player-status">Back to Player Status</button>
</div>
