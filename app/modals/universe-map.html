<div class="universe-map-container">
  <div class="universe-map-layout">
    <div class="universe-map-visualization">
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in" title="Zoom In">+</button>
        <button class="zoom-btn" id="zoom-out" title="Zoom Out">−</button>
        <button class="zoom-btn" id="zoom-reset" title="Reset View">⌂</button>
      </div>
      <div id="universe-map-diagram"></div>
    </div>
    <div class="universe-map-details">
      <h3>System Details</h3>
      <div id="system-details">
        <p>Click on a system to view details</p>
      </div>
    </div>
  </div>
</div>
